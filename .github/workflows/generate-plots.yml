name: Generate Historical Plots
on:
  workflow_dispatch:  # Manual trigger
    inputs:
      country:
        description: 'Country code (e.g. DE) or leave empty for all countries'
        required: false
        default: ''
permissions:
  contents: write
jobs:
  generate-plots:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        pip install pandas==2.2.3 matplotlib numpy gspread google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client
        
    - name: Generate historical plots
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: |
        if [ -n "${{ github.event.inputs.country }}" ]; then
          python scripts/eu_energy_plotting.py --country ${{ github.event.inputs.country }}
        else
          python scripts/eu_energy_plotting.py
        fi
    
    - name: Generate Summary Table JSON
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      run: |
        echo "Generating summary table JSON..."
        python scripts/generate_summary_table_json.py || echo "Failed to generate JSON"
        
    - name: Commit and push plots
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add -f plots/*.html plots/*.json
        git diff --staged --quiet || git commit -m "Generate historical plots and summary JSON [skip ci]"
        git pull --rebase origin main || true
        git push || true
