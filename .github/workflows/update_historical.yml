name: Update Historical Data
on:
  schedule:
    # Daily updates for historical data (at 0:00 AM UTC)
    - cron: '0 22 * * *'
  
  workflow_dispatch:
    inputs:
      years_start:
        description: 'Start year (default: current year)'
        required: false
        default: ''
      years_end:
        description: 'End year (default: current year)'
        required: false
        default: ''
      country:
        description: 'Country code to process (default: all). E.g. DE, FR, EU, RS, BA, ME, MK, XK, GE'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  update-historical:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install entsoe-py pandas==2.2.3 matplotlib numpy gspread google-auth pytz scipy google-api-python-client geopandas shapely pyproj cairosvg Pillow
      
      - name: Create plots directory
        run: mkdir -p plots
      
      - name: Run Historical Data Collection
        env:
          ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          YEAR_START="${{ github.event.inputs.years_start }}"
          YEAR_END="${{ github.event.inputs.years_end }}"
          COUNTRY="${{ github.event.inputs.country }}"
          
          CURRENT_YEAR=$(date +%Y)
          YEAR_START=${YEAR_START:-$CURRENT_YEAR}
          YEAR_END=${YEAR_END:-$CURRENT_YEAR}
          
          CMD="python scripts/eu_energy_data_collection.py --years $YEAR_START $YEAR_END"
          if [ -n "$COUNTRY" ]; then
            COUNTRY_CLEAN=$(echo "$COUNTRY" | tr ',' ' ' | tr -s ' ')
            CMD="$CMD --countries $COUNTRY_CLEAN"
          fi
          
          echo "Running: $CMD"
          eval $CMD
      
      - name: Run Historical Data Plotting
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          COUNTRY="${{ github.event.inputs.country }}"
          
          CMD="python scripts/eu_energy_plotting.py"
          if [ -n "$COUNTRY" ]; then
            CMD="$CMD --country $COUNTRY"
          fi
          
          echo "Running: $CMD"
          eval $CMD
      
      - name: Generate Summary Table JSON
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "Generating summary table JSON..."
          python scripts/generate_summary_table_json.py || echo "Failed to generate JSON"
      
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Pull latest changes with rebase and autostash
          git pull --rebase --autostash origin main
          
          # Add all plots
          git add -f plots/*.html plots/*.json
          
          # Commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update historical plots, summary JSON and maps [daily]" && git push)
